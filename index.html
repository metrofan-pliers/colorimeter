<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Colorimeter</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background-color: #000;
            color: #fff;
            font-family: Arial, sans-serif;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        .container {
            text-align: center;
        }
        .color-box {
            width: 200px;
            height: 200px;
            margin: 0 auto 30px;
            border-radius: 20px;
            border: 3px solid #333;
        }
        .color-name {
            font-size: 32px;
            font-weight: bold;
            margin-bottom: 20px;
        }
        .info {
            font-size: 18px;
            color: #aaa;
            margin: 10px 0;
            padding: 10px;
            background: #111;
            border-radius: 8px;
        }
        .info span {
            color: #fff;
            font-family: monospace;
        }
        .error {
            color: #ff4444;
            font-size: 18px;
        }
        .loading {
            color: #666;
            font-size: 18px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="color-box" id="colorBox"></div>
        <div class="color-name" id="colorName">Загрузка...</div>
        <div class="info">HEX: <span id="hex">-</span></div>
        <div class="info">RGB: <span id="rgb">-</span></div>
        <div class="info">HSV: <span id="hsv">-</span></div>
        <div class="info">CMYK: <span id="cmyk">-</span></div>
    </div>

    <script>
        // Измени эту ссылку на адрес твоего сервера
        const SERVER_URL = 'link';

        function rgbToHsv(r, g, b) {
            r /= 255;
            g /= 255;
            b /= 255;
            const max = Math.max(r, g, b);
            const min = Math.min(r, g, b);
            const diff = max - min;
            let h = 0;
            const s = max === 0 ? 0 : diff / max;
            const v = max;
            if (diff !== 0) {
                if (max === r) h = 60 * (((g - b) / diff) % 6);
                else if (max === g) h = 60 * (((b - r) / diff) + 2);
                else h = 60 * (((r - g) / diff) + 4);
            }
            if (h < 0) h += 360;
            return { h: Math.round(h), s: Math.round(s * 100), v: Math.round(v * 100) };
        }

        function rgbToCmyk(r, g, b) {
            const rN = r / 255, gN = g / 255, bN = b / 255;
            const k = 1 - Math.max(rN, gN, bN);
            if (k === 1) return { c: 0, m: 0, y: 0, k: 100 };
            return {
                c: Math.round((1 - rN - k) / (1 - k) * 100),
                m: Math.round((1 - gN - k) / (1 - k) * 100),
                y: Math.round((1 - bN - k) / (1 - k) * 100),
                k: Math.round(k * 100)
            };
        }

        function detectColorName(r, g, b, h, s, v) {
            const sN = s / 100, vN = v / 100;
            if (vN < 0.10) return 'Чёрный';
            if (sN < 0.18) {
                if (vN > 0.80) return 'Белый';
                if (vN > 0.25) return 'Серый';
                return 'Чёрный';
            }
            if (sN < 0.4 && vN > 0.4) {
                if (h >= 20 && h < 50) return 'Бежевый';
                if (h >= 320 || h < 20) return 'Розовый';
            }
            if (h < 40 && vN < 0.20 && sN > 0.25) return 'Коричневый';
            if (h >= 30 && h < 55) return 'Жёлтый';
            if (h >= 5 && h < 25 && vN >= 0.35) return 'Оранжевый';
            if (h >= 0 && h < 45) return 'Красный';
            if (h >= 45 && h < 75) return 'Жёлтый';
            if (h >= 75 && h < 150) return 'Зелёный';
            if (h >= 150 && h < 195) return 'Голубой';
            if (h >= 195 && h < 255) return 'Синий';
            if (h >= 255 && h < 285) return 'Фиолетовый';
            if (h >= 285 && h < 345) return 'Пурпурный';
            return 'Неизвестно';
        }

        async function fetchColor() {
            try {
                const response = await fetch(SERVER_URL + '/color');
                const data = await response.json();
                
                const r = data.r || 0;
                const g = data.g || 0;
                const b = data.b || 0;
                const hsv = rgbToHsv(r, g, b);
                const cmyk = rgbToCmyk(r, g, b);
                const colorName = detectColorName(r, g, b, hsv.h, hsv.s, hsv.v);
                
                document.getElementById('colorBox').style.backgroundColor = data.hex;
                document.getElementById('colorName').textContent = colorName;
                document.getElementById('hex').textContent = data.hex;
                document.getElementById('rgb').textContent = `RGB(${r}, ${g}, ${b})`;
                document.getElementById('hsv').textContent = `HSV(${hsv.h}, ${hsv.s}%, ${hsv.v}%)`;
                document.getElementById('cmyk').textContent = `CMYK(${cmyk.c}%, ${cmyk.m}%, ${cmyk.y}%, ${cmyk.k}%)`;
            } catch (error) {
                document.getElementById('colorName').innerHTML = '<span class="error">Нет подключения</span>';
                console.error('Error:', error);
            }
        }

        // Загружаем сразу
        fetchColor();
        // Обновляем каждые 2 секунды
        setInterval(fetchColor, 2000);
    </script>
</body>
</html>
